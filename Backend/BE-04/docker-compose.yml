version: "3.9"

services:
  db:
    image: postgres:16

    container_name: be04_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: be04

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .

    container_name: be04_fastapi

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/be04

    ports:
      - "8000:8000"

    restart: always

volumes:
  pgdata: